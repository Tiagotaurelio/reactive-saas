name: Deploy ReActive to Hostinger

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Copy project to Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: ${{ secrets.REACTIVE_DEPLOY_PATH }}
          overwrite: true
          rm: false

      - name: Deploy container on Hostinger
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -eu
            DEPLOY_PATH="${{ secrets.REACTIVE_DEPLOY_PATH }}"
            REACTIVE_PUBLIC_DOMAIN="${{ secrets.REACTIVE_PUBLIC_DOMAIN }}"
            PEPA_PUBLIC_DOMAIN="${{ secrets.PEPA_PUBLIC_DOMAIN }}"
            if [ -z "$REACTIVE_PUBLIC_DOMAIN" ]; then
              REACTIVE_PUBLIC_DOMAIN="reactive-hml.tavarestech.cloud"
            fi
            if [ -z "$PEPA_PUBLIC_DOMAIN" ]; then
              PEPA_PUBLIC_DOMAIN="pepa-hml.tavarestech.cloud"
            fi
            mkdir -p "$DEPLOY_PATH/data"
            cat > "$DEPLOY_PATH/.env" <<'EOF'
            DATABASE_URL=${{ secrets.REACTIVE_DATABASE_URL }}
            DATABASE_SSL=${{ secrets.REACTIVE_DATABASE_SSL }}
            REACTIVE_DATA_DIR=/app/data
            EOF
            cd "$DEPLOY_PATH"
            docker build -t reactive-saas:latest .
            docker rm -f reactive-saas-hml || true
            for attempt in $(seq 1 15); do
              if ! docker ps -a --format '{{.Names}}' | grep -qx 'reactive-saas-hml'; then
                break
              fi
              sleep 1
            done
            if docker ps -a --format '{{.Names}}' | grep -qx 'reactive-saas-hml'; then
              echo "reactive-saas-hml still exists after removal attempt"
              exit 1
            fi
            docker run -d \
              --name reactive-saas-hml \
              --restart unless-stopped \
              --env-file "$DEPLOY_PATH/.env" \
              --network easypanel \
              -v "$DEPLOY_PATH/data:/app/data" \
              -p 3100:3000 \
              reactive-saas:latest
            TRAEFIK_CONTAINER="$(docker ps --filter name=traefik --format '{{.Names}}' | head -n 1)"
            if [ -n "$TRAEFIK_CONTAINER" ]; then
              docker exec "$TRAEFIK_CONTAINER" sh -lc "cat > /data/config/tavarestech.yml <<'EOF'
            http:
              routers:
                reactive-http:
                  rule: Host(\"$REACTIVE_PUBLIC_DOMAIN\")
                  entryPoints:
                    - http
                  middlewares:
                    - redirect-to-https
                  service: reactive-service
                reactive-https:
                  rule: Host(\"$REACTIVE_PUBLIC_DOMAIN\")
                  entryPoints:
                    - https
                  tls:
                    certResolver: letsencrypt
                  service: reactive-service
                pepa-http:
                  rule: Host(\"$PEPA_PUBLIC_DOMAIN\")
                  entryPoints:
                    - http
                  middlewares:
                    - redirect-to-https
                  service: pepa-service
                pepa-https:
                  rule: Host(\"$PEPA_PUBLIC_DOMAIN\")
                  entryPoints:
                    - https
                  tls:
                    certResolver: letsencrypt
                  service: pepa-service
              middlewares:
                redirect-to-https:
                  redirectScheme:
                    scheme: https
              services:
                reactive-service:
                  loadBalancer:
                    servers:
                      - url: http://reactive-saas-hml:3000
                pepa-service:
                  loadBalancer:
                    servers:
                      - url: http://pepa-saas-hml:3000
            EOF"
            fi
