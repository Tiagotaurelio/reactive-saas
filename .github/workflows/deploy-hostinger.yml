name: Deploy ReActive to Hostinger

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy project to Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: ${{ secrets.REACTIVE_DEPLOY_PATH }}
          overwrite: true
          rm: false

      - name: Deploy container on Hostinger
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -eu
            DEPLOY_PATH="${{ secrets.REACTIVE_DEPLOY_PATH }}"
            mkdir -p "$DEPLOY_PATH/data"
            cat > "$DEPLOY_PATH/.env" <<'EOF'
            DATABASE_URL=${{ secrets.REACTIVE_DATABASE_URL }}
            DATABASE_SSL=${{ secrets.REACTIVE_DATABASE_SSL }}
            REACTIVE_DATA_DIR=/app/data
            EOF
            cd "$DEPLOY_PATH"
            docker build -t reactive-saas:latest .
            docker rm -f reactive-saas-hml || true
            docker run -d \
              --name reactive-saas-hml \
              --restart unless-stopped \
              --env-file "$DEPLOY_PATH/.env" \
              --network easypanel \
              --label traefik.enable=true \
              --label traefik.http.routers.reactive-http.rule=Host\(\`reactive.tavarestech.cloud\`\) \
              --label traefik.http.routers.reactive-http.entrypoints=http \
              --label traefik.http.routers.reactive-http.middlewares=reactive-https-redirect \
              --label traefik.http.middlewares.reactive-https-redirect.redirectscheme.scheme=https \
              --label traefik.http.routers.reactive-https.rule=Host\(\`reactive.tavarestech.cloud\`\) \
              --label traefik.http.routers.reactive-https.entrypoints=https \
              --label traefik.http.routers.reactive-https.tls=true \
              --label traefik.http.routers.reactive-https.tls.certresolver=letsencrypt \
              --label traefik.http.services.reactive.loadbalancer.server.port=3000 \
              -v "$DEPLOY_PATH/data:/app/data" \
              -p 3100:3000 \
              reactive-saas:latest
