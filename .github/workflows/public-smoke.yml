name: Public Smoke ReActive

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run public smoke
        env:
          APP_URL: https://reactive.tavarestech.cloud
        run: |
          sh ./scripts/post-deploy-smoke.sh
